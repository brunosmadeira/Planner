<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Planner">
<title>Planner – MAD</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: 'Outfit', sans-serif; background: #f8fafc; color: #0f172a; -webkit-tap-highlight-color: transparent; }
  button, select, input, textarea { font-family: 'Outfit', sans-serif; }
  select { -webkit-appearance: none; }

  #app { display: flex; height: 100vh; overflow: hidden; }

  /* Sidebar */
  #sidebar { width: 220px; flex-shrink: 0; background: #0f172a; display: flex; flex-direction: column; height: 100vh; }
  .sidebar-logo { padding: 24px 24px 20px; border-bottom: 1px solid #1e293b; }
  .sidebar-logo h1 { font-size: 18px; font-weight: 800; color: #f8fafc; letter-spacing: -0.02em; }
  .sidebar-logo .date { font-size: 11px; color: #475569; margin-top: 3px; }
  .nav-btn { display: flex; align-items: center; gap: 10px; width: 100%; padding: 11px 24px; background: transparent; border: none; border-left: 3px solid transparent; color: #64748b; font-size: 14px; font-weight: 500; cursor: pointer; text-align: left; transition: all 0.15s; }
  .nav-btn.active { background: rgba(255,255,255,0.07); border-left-color: #60a5fa; color: #f8fafc; }
  .nav-btn:hover:not(.active) { color: #94a3b8; }
  .sidebar-legend { padding: 14px 24px; border-top: 1px solid #1e293b; }
  .legend-title { font-size: 10px; font-weight: 600; color: #334155; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
  .legend-item { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 2px; }
  .legend-label { font-size: 11px; color: #64748b; line-height: 1.3; }
  .sidebar-footer { padding: 12px 16px 20px; border-top: 1px solid #1e293b; }
  .sync-row { display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 10px; }
  .sync-badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
  .refresh-btn { width: 28px; height: 28px; border-radius: 50%; border: 1px solid #334155; background: #1e293b; color: #64748b; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
  .refresh-btn:hover { background: #334155; color: #f8fafc; }
  .refresh-btn.spinning { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .add-btn { width: 100%; padding: 10px; background: #2563eb; border: none; border-radius: 10px; color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
  .add-btn:hover { background: #1d4ed8; }

  /* Main */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .main-header { padding: 24px 28px 0; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .main-header h2 { font-size: 22px; font-weight: 800; letter-spacing: -0.03em; }
  .main-header .task-count { font-size: 12px; color: #94a3b8; }
  .main-content { flex: 1; overflow-y: auto; padding: 20px 28px 32px; }

  .stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: #fff; border-radius: 14px; padding: 14px 18px; border: 1px solid #f1f5f9; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
  .stat-num { font-size: 26px; font-weight: 800; letter-spacing: -0.03em; line-height: 1; }
  .stat-label { font-size: 11px; color: #94a3b8; margin-top: 5px; font-weight: 500; }

  .filter-bar { background: #fff; border-radius: 14px; border: 1px solid #f1f5f9; padding: 12px 16px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
  .filter-input, .filter-select { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 7px 11px; font-size: 13px; color: #0f172a; outline: none; font-family: 'Outfit', sans-serif; }
  .filter-input { min-width: 160px; }
  .filter-clear { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; border-radius: 8px; padding: 7px 12px; font-size: 12px; cursor: pointer; font-weight: 500; }
  .filter-count { margin-left: auto; font-size: 12px; color: #94a3b8; }

  .status-group { margin-bottom: 22px; }
  .status-group-header { display: flex; align-items: center; gap: 7px; margin-bottom: 9px; }
  .status-group-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .status-group-label { font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
  .status-group-count { font-size: 11px; color: #94a3b8; background: #f8fafc; border: 1px solid #f1f5f9; border-radius: 20px; padding: 1px 8px; }

  .task-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: #fff; border: 1px solid #f1f5f9; border-radius: 11px; cursor: pointer; transition: all 0.15s; margin-bottom: 5px; border-left-width: 4px; }
  .task-row:hover { box-shadow: 0 4px 18px rgba(0,0,0,0.07); }
  .task-status-pill { flex-shrink: 0; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; white-space: nowrap; border-width: 1px; border-style: solid; }
  .task-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .task-notes { font-size: 12px; color: #94a3b8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
  .task-badges { display: flex; gap: 5px; align-items: center; flex-shrink: 0; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; white-space: nowrap; }
  .task-date { flex-shrink: 0; text-align: right; min-width: 88px; font-size: 12px; font-weight: 600; }
  .task-date-sub { font-size: 10px; font-weight: 500; margin-top: 2px; }

  .cal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid #f1f5f9; }
  .cal-nav-btn { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 6px 14px; cursor: pointer; font-size: 16px; color: #64748b; }
  .cal-month-title { font-size: 16px; font-weight: 700; color: #0f172a; }
  .cal-weekdays { display: grid; grid-template-columns: repeat(7,1fr); border-bottom: 1px solid #f8fafc; }
  .cal-weekday { padding: 8px 0; text-align: center; font-size: 11px; font-weight: 600; color: #cbd5e1; letter-spacing: 0.06em; }
  .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); }
  .cal-cell { min-height: 80px; border-right: 1px solid #f1f5f9; border-bottom: 1px solid #f1f5f9; padding: 7px 5px; cursor: pointer; transition: background 0.12s; background: #fff; }
  .cal-cell:hover { background: #f8fafc; }
  .cal-cell.empty { background: #fafafa; cursor: default; }
  .cal-cell.today-cell { background: #f0f9ff; }
  .cal-day-num { font-size: 11px; font-weight: 500; color: #94a3b8; margin-bottom: 3px; }
  .cal-today-num { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; border-radius: 50%; background: #2563eb; color: #fff; font-size: 10px; font-weight: 700; margin-bottom: 3px; }
  .cal-task-chip { font-size: 10px; padding: 2px 5px; border-radius: 4px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; cursor: pointer; border-width: 1px; border-style: solid; }
  .cal-more { font-size: 9px; color: #cbd5e1; margin-top: 1px; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.4); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; z-index: 500; }
  .modal-overlay.hidden { display: none; }
  .modal-card { background: #fff; border-radius: 20px; padding: 32px; width: 490px; max-width: 95vw; max-height: 90vh; overflow-y: auto; box-shadow: 0 24px 64px rgba(0,0,0,0.13); }
  .modal-stripe { height: 4px; border-radius: 4px; width: 35%; margin-bottom: 20px; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .modal-title { font-size: 17px; font-weight: 700; color: #0f172a; letter-spacing: -0.02em; }
  .modal-close { background: #f1f5f9; border: none; border-radius: 8px; width: 32px; height: 32px; cursor: pointer; color: #64748b; font-size: 16px; }
  .form-label { display: block; font-size: 11px; font-weight: 600; color: #94a3b8; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 5px; }
  .form-input, .form-select, .form-textarea { width: 100%; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 10px 12px; font-size: 14px; color: #0f172a; outline: none; font-family: 'Outfit', sans-serif; -webkit-appearance: none; }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: #3b82f6; }
  .form-textarea { resize: vertical; line-height: 1.6; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  .form-group { margin-bottom: 14px; }
  .modal-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 22px; }
  .btn-delete { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; border-radius: 8px; padding: 10px 14px; font-size: 13px; cursor: pointer; font-weight: 500; }
  .btn-cancel { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px 16px; font-size: 13px; color: #64748b; cursor: pointer; }
  .btn-save { background: #0f172a; border: none; border-radius: 8px; padding: 10px 22px; font-size: 13px; color: #fff; font-weight: 600; cursor: pointer; }

  .loading-block { text-align: center; padding: 52px 0; color: #94a3b8; font-size: 14px; }
  .spin-icon { font-size: 28px; display: inline-block; animation: spin 1s linear infinite; margin-bottom: 10px; }
  .empty-block { text-align: center; padding: 60px 0; color: #cbd5e1; font-size: 14px; }
  .calendar-wrapper { background: #fff; border-radius: 16px; border: 1px solid #f1f5f9; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }

  /* MOBILE */
  @media (max-width: 767px) {
    #app { flex-direction: column; height: 100dvh; }
    #sidebar { display: none; }
    #mobile-header { background: #0f172a; padding: 14px 16px 12px; padding-top: calc(14px + env(safe-area-inset-top)); flex-shrink: 0; }
    .mob-header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .mob-logo { font-size: 18px; font-weight: 800; color: #f8fafc; letter-spacing: -0.02em; }
    .mob-date { font-size: 11px; color: #475569; margin-top: 2px; }
    .mob-right { display: flex; align-items: center; gap: 8px; }
    .mob-add-btn { background: #2563eb; border: none; border-radius: 9px; padding: 9px 13px; color: #fff; font-size: 13px; font-weight: 700; cursor: pointer; }
    .mob-stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 7px; }
    .mob-stat { background: rgba(255,255,255,0.07); border-radius: 10px; padding: 8px 6px; text-align: center; }
    .mob-stat-num { font-size: 18px; font-weight: 800; line-height: 1; }
    .mob-stat-label { font-size: 9px; color: #475569; margin-top: 3px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
    #main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    .main-header { display: none; }
    .main-content { padding: 14px; }
    .stats-grid { display: none; }
    .filter-bar { gap: 7px; padding: 10px 12px; }
    .filter-input { min-width: 0; flex: 1; }
    .cal-cell { min-height: 52px; padding: 5px 3px; }
    .modal-overlay { align-items: flex-end; }
    .modal-card { border-radius: 20px 20px 0 0; padding: 20px 20px 32px; width: 100%; max-width: 100%; max-height: 92dvh; }
    .modal-handle { width: 36px; height: 4px; background: #e2e8f0; border-radius: 2px; margin: 0 auto 18px; display: block; }
    #bottom-nav { display: flex; background: #fff; border-top: 1px solid #f1f5f9; padding: 8px 0; padding-bottom: calc(8px + env(safe-area-inset-bottom)); box-shadow: 0 -4px 20px rgba(0,0,0,0.06); flex-shrink: 0; }
    .bot-nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 7px 0; background: none; border: none; cursor: pointer; color: #94a3b8; font-family: 'Outfit', sans-serif; }
    .bot-nav-btn.active { color: #2563eb; }
    .bot-nav-icon { font-size: 20px; line-height: 1; }
    .bot-nav-label { font-size: 10px; font-weight: 600; letter-spacing: 0.03em; }
    .filter-sheet-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.4); backdrop-filter: blur(6px); display: flex; align-items: flex-end; justify-content: center; z-index: 400; }
    .filter-sheet-overlay.hidden { display: none; }
    .filter-sheet { background: #fff; border-radius: 20px 20px 0 0; padding: 20px 20px 36px; width: 100%; }
    .filter-sheet-handle { width: 36px; height: 4px; background: #e2e8f0; border-radius: 2px; margin: 0 auto 18px; }
    .filter-apply-btn { width: 100%; padding: 13px; background: #0f172a; border: none; border-radius: 12px; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 6px; }
  }
  @media (min-width: 768px) {
    #mobile-header, #bottom-nav, .filter-sheet-overlay, .modal-handle { display: none !important; }
  }
</style>
</head>
<body>

<div id="app">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sidebar-logo">
      <h1>Planner MAD</h1>
      <div class="date" id="sidebar-date"></div>
    </div>
    <button class="nav-btn active" onclick="switchView('list',this)"><span style="font-size:16px;opacity:.7">≡</span> Lista</button>
    <button class="nav-btn" onclick="switchView('calendar',this)"><span style="font-size:16px;opacity:.7">⊟</span> Calendário</button>
    <div style="flex:1"></div>
    <div class="sidebar-legend">
      <div class="legend-title">Status</div>
      <div id="sidebar-legend-items"></div>
    </div>
    <div class="sidebar-footer">
      <div class="sync-row">
        <span class="sync-badge" id="desk-sync-badge"></span>
        <button class="refresh-btn" id="desk-refresh-btn" onclick="manualRefresh()" title="Recarregar">↻</button>
      </div>
      <button class="add-btn" onclick="openModal()">+ Nova tarefa</button>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div id="mobile-header">
      <div class="mob-header-row">
        <div>
          <div class="mob-logo">Planner MAD</div>
          <div class="mob-date" id="mob-date"></div>
        </div>
        <div class="mob-right">
          <span class="sync-badge" id="mob-sync-badge"></span>
          <button class="refresh-btn" id="mob-refresh-btn" onclick="manualRefresh()">↻</button>
          <button class="mob-add-btn" onclick="openModal()">+ Nova</button>
        </div>
      </div>
      <div class="mob-stats">
        <div class="mob-stat"><div class="mob-stat-num" id="ms-total" style="color:#818cf8">0</div><div class="mob-stat-label">Total</div></div>
        <div class="mob-stat"><div class="mob-stat-num" id="ms-done"  style="color:#4ade80">0</div><div class="mob-stat-label">Feitas</div></div>
        <div class="mob-stat"><div class="mob-stat-num" id="ms-over"  style="color:#f87171">0</div><div class="mob-stat-label">Atrasadas</div></div>
        <div class="mob-stat"><div class="mob-stat-num" id="ms-today" style="color:#fb923c">0</div><div class="mob-stat-label">Hoje</div></div>
      </div>
    </div>
    <div class="main-header">
      <h2 id="view-title">Minhas Tarefas</h2>
      <span class="task-count" id="task-count"></span>
    </div>
    <div class="main-content" id="main-content"></div>
    <div id="bottom-nav">
      <button class="bot-nav-btn active" id="bnav-list" onclick="switchView('list',null)">
        <span class="bot-nav-icon">≡</span><span class="bot-nav-label">Lista</span>
      </button>
      <button class="bot-nav-btn" id="bnav-calendar" onclick="switchView('calendar',null)">
        <span class="bot-nav-icon">⊟</span><span class="bot-nav-label">Calendário</span>
      </button>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay hidden" id="modal-overlay" onclick="closeModalOnBg(event)">
  <div class="modal-card">
    <div class="modal-handle"></div>
    <div class="modal-stripe" id="modal-stripe"></div>
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Nova tarefa</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Título *</label>
      <input class="form-input" id="f-title" placeholder="Descreva a tarefa…" style="font-size:15px;font-weight:500">
    </div>
    <div class="form-row">
      <div><label class="form-label">Conclusão</label><input class="form-input" id="f-date" type="date"></div>
      <div><label class="form-label">Prioridade</label><select class="form-select" id="f-priority"></select></div>
    </div>
    <div class="form-row">
      <div><label class="form-label">Status</label><select class="form-select" id="f-status" onchange="updateModalStripe()"></select></div>
      <div><label class="form-label">Categoria</label><select class="form-select" id="f-category"></select></div>
    </div>
    <div class="form-group">
      <label class="form-label">Notas</label>
      <textarea class="form-textarea" id="f-notes" rows="3" placeholder="Nº do processo, observações…"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Etiqueta</label>
      <div style="display:flex;gap:10px">
        <button type="button" id="etq-md" onclick="setEtiqueta('MD')" style="flex:1;padding:10px;border-radius:10px;border:2px solid #e2e8f0;background:#f8fafc;color:#94a3b8;font-weight:700;font-size:14px;cursor:pointer;transition:all 0.15s;font-family:'Outfit',sans-serif">MD</button>
        <button type="button" id="etq-mad" onclick="setEtiqueta('MAD')" style="flex:1;padding:10px;border-radius:10px;border:2px solid #e2e8f0;background:#f8fafc;color:#94a3b8;font-weight:700;font-size:14px;cursor:pointer;transition:all 0.15s;font-family:'Outfit',sans-serif">MAD</button>
        <button type="button" id="etq-none" onclick="setEtiqueta('')" style="flex:0.5;padding:10px;border-radius:10px;border:2px solid #e2e8f0;background:#f8fafc;color:#cbd5e1;font-size:12px;cursor:pointer;transition:all 0.15s;font-family:'Outfit',sans-serif">—</button>
      </div>
    </div>
    <div class="modal-footer">
      <div><button class="btn-delete" id="btn-delete" onclick="deleteTask()">Excluir</button></div>
      <div style="display:flex;gap:8px">
        <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="btn-save" onclick="saveTask()">Criar</button>
      </div>
    </div>
  </div>
</div>

<!-- FILTER SHEET -->
<div class="filter-sheet-overlay hidden" id="filter-sheet-overlay" onclick="if(event.target===this)closeFilterSheet()">
  <div class="filter-sheet">
    <div class="filter-sheet-handle"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
      <span style="font-size:16px;font-weight:700;color:#0f172a">Filtros</span>
      <button class="filter-clear" id="sheet-clear-btn" onclick="clearFilters()" style="display:none">Limpar</button>
    </div>
    <div style="margin-bottom:14px"><label class="form-label">Status</label><select class="form-select" id="sheet-f-status" style="width:100%" onchange="syncFiltersFromSheet()"></select></div>
    <div style="margin-bottom:14px"><label class="form-label">Prioridade</label><select class="form-select" id="sheet-f-priority" style="width:100%" onchange="syncFiltersFromSheet()"></select></div>
    <div style="margin-bottom:14px"><label class="form-label">Categoria</label><select class="form-select" id="sheet-f-category" style="width:100%" onchange="syncFiltersFromSheet()"></select></div>
    <div style="margin-bottom:14px"><label class="form-label">Data</label><input class="form-input" id="sheet-f-date" type="date" style="width:100%" onchange="syncFiltersFromSheet()"></div>
    <button class="filter-apply-btn" onclick="closeFilterSheet()">Aplicar filtros</button>
  </div>
</div>

<script>
// ═══════════════ CONFIG ═══════════════
const SUPABASE_URL  = "https://fkjwecyylzfninnymevd.supabase.co";
const SUPABASE_KEY  = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZrandlY3l5bHpmbmlubnltZXZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5NjMwODksImV4cCI6MjA5NDUzOTA4OX0.PtsXwiZzU6Z0x2Q4qcfVDO8hW8LyVnVp9GOYyWBkTZ0";
const TABLE         = "tarefas";

const STATUSES = [
  { label:"Pendente",             color:"#dc2626", bg:"#fef2f2", border:"#fecaca" },
  { label:"Revisão",              color:"#ea580c", bg:"#fff7ed", border:"#fed7aa" },
  { label:"Aguardando retorno",   color:"#2563eb", bg:"#eff6ff", border:"#bfdbfe" },
  { label:"Aguardando protocolo", color:"#ca8a04", bg:"#fefce8", border:"#fde68a" },
  { label:"Concluída",            color:"#16a34a", bg:"#f0fdf4", border:"#bbf7d0" },
];
const STATUS_MAP    = Object.fromEntries(STATUSES.map(s=>[s.label,s]));
const STATUS_LABELS = STATUSES.map(s=>s.label);
const PRIORITIES    = ["Alta","Média","Baixa"];
const PRIORITY_COLORS = {Alta:"#ef4444",Média:"#f59e0b",Baixa:"#22c55e"};
const CATEGORIES    = ["Jurídico","Acadêmico","Administrativo","Cliente","Pessoal","Outro"];
const MONTHS_PT     = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const DAYS_PT       = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
const DAYS_SHORT    = ["D","S","T","Q","Q","S","S"];

// ═══════════════ STATE ═══════════════
let tasks=[], currentView="list", syncStatus="loading", refreshing=false;
let editingId=null, calYear=new Date().getFullYear(), calMonth=new Date().getMonth();
let filters={status:"Todos",priority:"Todos",category:"Todos",date:"",search:""};
let saveQueue=[], saveTimer=null;

// ═══════════════ HELPERS ═══════════════
const fwd  = n=>{const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);};
const fmt  = ds=>{if(!ds)return"—";const[y,m,d]=ds.split("-");return`${d}/${m}/${y}`;};
const today= ()=>new Date().toISOString().slice(0,10);
const isOverdue=(ds,st)=>!!ds&&st!=="Concluída"&&ds<today();
const isToday  =ds=>ds===today();
const uid      =()=>crypto.randomUUID();
const escHtml  =s=>(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const calDaysArr=(y,m)=>{
  const first=new Date(y,m,1).getDay(),last=new Date(y,m+1,0).getDate();
  return [...Array(first).fill(null),...Array.from({length:last},(_,i)=>i+1)];
};

// ═══════════════ SUPABASE API ═══════════════
const sbHeaders = {"Content-Type":"application/json","apikey":SUPABASE_KEY,"Authorization":`Bearer ${SUPABASE_KEY}`};

async function sbLoad() {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?select=*`, {headers:sbHeaders});
  if (!r.ok) throw new Error(await r.text());
  return await r.json();
}

async function sbInsert(task) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}`, {
    method:"POST", headers:{...sbHeaders,"Prefer":"return=representation"},
    body:JSON.stringify({id:task.id,title:task.title,category:task.category,priority:task.priority,status:task.status,due_date:task.dueDate||null,notes:task.notes||"",etiqueta:task.etiqueta||""})
  });
  if (!r.ok) throw new Error(await r.text());
}

async function sbUpdate(task) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?id=eq.${task.id}`, {
    method:"PATCH", headers:{...sbHeaders,"Prefer":"return=representation"},
    body:JSON.stringify({title:task.title,category:task.category,priority:task.priority,status:task.status,due_date:task.dueDate||null,notes:task.notes||"",etiqueta:task.etiqueta||""})
  });
  if (!r.ok) throw new Error(await r.text());
}

async function sbDelete(id) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?id=eq.${id}`, {method:"DELETE",headers:sbHeaders});
  if (!r.ok) throw new Error(await r.text());
}

function sbRowToTask(row) {
  return {id:row.id,title:row.title,category:row.category||"Jurídico",priority:row.priority||"Alta",status:row.status||"Pendente",dueDate:row.due_date||"",notes:row.notes||"",etiqueta:row.etiqueta||""};
}

// ═══════════════ SYNC STATUS ═══════════════
const SYNC_CFG={
  loading:{color:"#2563eb",bg:"#eff6ff",text:"Carregando…"},
  saving: {color:"#ca8a04",bg:"#fefce8",text:"Salvando…"},
  saved:  {color:"#16a34a",bg:"#f0fdf4",text:"✓ Sincronizado"},
  error:  {color:"#dc2626",bg:"#fef2f2",text:"⚠ Erro"},
};
function setSyncStatus(s) {
  syncStatus=s;
  const c=SYNC_CFG[s]||SYNC_CFG.saved;
  ["desk-sync-badge","mob-sync-badge"].forEach(id=>{
    const el=document.getElementById(id);
    if(el){el.textContent=c.text;el.style.background=c.bg;el.style.color=c.color;}
  });
}

// ═══════════════ INIT ═══════════════
async function init() {
  buildStaticUI();
  setSyncStatus("loading");
  try {
    const rows = await sbLoad();
    tasks = rows.map(sbRowToTask);
    setSyncStatus("saved");
  } catch(e) {
    console.error(e);
    setSyncStatus("error");
  }
  render();
}

async function manualRefresh() {
  if(refreshing)return;
  refreshing=true;
  ["desk-refresh-btn","mob-refresh-btn"].forEach(id=>document.getElementById(id)?.classList.add("spinning"));
  setSyncStatus("loading");
  try {
    const rows=await sbLoad();
    tasks=rows.map(sbRowToTask);
    setSyncStatus("saved");
  } catch { setSyncStatus("error"); }
  finally {
    refreshing=false;
    ["desk-refresh-btn","mob-refresh-btn"].forEach(id=>document.getElementById(id)?.classList.remove("spinning"));
  }
  render();
}

// ═══════════════ STATIC UI ═══════════════
function buildStaticUI() {
  document.getElementById("sidebar-date").textContent = new Date().toLocaleDateString("pt-BR",{weekday:"long",day:"2-digit",month:"long"});
  document.getElementById("mob-date").textContent     = new Date().toLocaleDateString("pt-BR",{weekday:"long",day:"2-digit",month:"short"});
  document.getElementById("sidebar-legend-items").innerHTML = STATUSES.map(s=>`<div class="legend-item"><span class="legend-dot" style="background:${s.color}"></span><span class="legend-label">${s.label}</span></div>`).join("");
  populateSelect("f-status",STATUS_LABELS);
  populateSelect("f-priority",PRIORITIES);
  populateSelect("f-category",CATEGORIES);
  populateSelect("f-etiqueta",["MD","MAD"]);
  populateSelect("sheet-f-status",["Todos",...STATUS_LABELS]);
  populateSelect("sheet-f-priority",["Todos",...PRIORITIES]);
  populateSelect("sheet-f-category",["Todos",...CATEGORIES]);
  populateSelect("sheet-f-etiqueta",["Todos","MD","MAD"]);
}

function populateSelect(id,opts) {
  const el=document.getElementById(id);
  if(el) el.innerHTML=opts.map(o=>`<option value="${o}">${o}</option>`).join("");
}

// ═══════════════ VIEW ═══════════════
function switchView(v,btn) {
  currentView=v;
  document.getElementById("view-title").textContent=v==="list"?"Minhas Tarefas":"Calendário";
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  if(btn)btn.classList.add("active");
  else document.querySelector(`.nav-btn[onclick*="${v}"]`)?.classList.add("active");
  document.getElementById("bnav-list").classList.toggle("active",v==="list");
  document.getElementById("bnav-calendar").classList.toggle("active",v==="calendar");
  render();
}

// ═══════════════ RENDER ═══════════════
function render() {
  renderStats();
  const mc=document.getElementById("main-content");
  mc.innerHTML="";
  if(currentView==="list") renderList(mc);
  else renderCalendar(mc);
}

function renderStats() {
  const total=tasks.length,done=tasks.filter(t=>t.status==="Concluída").length;
  const overdue=tasks.filter(t=>isOverdue(t.dueDate,t.status)).length;
  const todayN=tasks.filter(t=>isToday(t.dueDate)&&t.status!=="Concluída").length;
  document.getElementById("task-count").textContent=`${total} tarefa${total!==1?"s":""} no total`;
  document.getElementById("ms-total").textContent=total;
  document.getElementById("ms-done").textContent=done;
  document.getElementById("ms-over").textContent=overdue;
  document.getElementById("ms-today").textContent=todayN;
}

function renderList(container) {
  const total=tasks.length,done=tasks.filter(t=>t.status==="Concluída").length;
  const overdue=tasks.filter(t=>isOverdue(t.dueDate,t.status)).length;
  const todayN=tasks.filter(t=>isToday(t.dueDate)&&t.status!=="Concluída").length;

  container.innerHTML=`
    <div class="stats-grid">
      ${[{l:"Total",v:total,c:"#6366f1"},{l:"Concluídas",v:done,c:"#16a34a"},{l:"Atrasadas",v:overdue,c:"#dc2626"},{l:"Vencem hoje",v:todayN,c:"#ea580c"}]
        .map(s=>`<div class="stat-card"><div class="stat-num" style="color:${s.c}">${s.v}</div><div class="stat-label">${s.l}</div></div>`).join("")}
    </div>`;

  const hasF=filters.status!=="Todos"||filters.priority!=="Todos"||filters.category!=="Todos"||filters.date||filters.search;
  const isMob=window.innerWidth<768;

  container.innerHTML+=`
    <div class="filter-bar">
      ${isMob?`
        <input class="filter-input" placeholder="Buscar…" value="${filters.search}" oninput="filters.search=this.value;render()">
        <button style="background:${hasF?"#2563eb":"#fff"};border:1px solid ${hasF?"#2563eb":"#e2e8f0"};border-radius:10px;padding:0 14px;color:${hasF?"#fff":"#64748b"};font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;height:38px" onclick="openFilterSheet()">${hasF?"Filtros ✓":"Filtrar"}</button>
      `:`
        <input class="filter-input" placeholder="Buscar tarefas…" value="${filters.search}" oninput="filters.search=this.value;render()">
        <select class="filter-select" id="filter-status" onchange="filters.status=this.value;render()"></select>
        <select class="filter-select" id="filter-priority" onchange="filters.priority=this.value;render()"></select>
        <select class="filter-select" id="filter-category" onchange="filters.category=this.value;render()"></select>
        <input class="filter-input" type="date" value="${filters.date}" style="width:auto" onchange="filters.date=this.value;render()">
        ${hasF?`<button class="filter-clear" onclick="clearFilters()">Limpar</button>`:""}
      `}
      <span class="filter-count" id="filter-count"></span>
    </div>`;

  if(!isMob) {
    populateSelect("filter-status",["Todos",...STATUS_LABELS]);
    populateSelect("filter-priority",["Todos",...PRIORITIES]);
    populateSelect("filter-category",["Todos",...CATEGORIES]);
    document.getElementById("filter-status").value=filters.status;
    document.getElementById("filter-priority").value=filters.priority;
    document.getElementById("filter-category").value=filters.category;
  }

  const filtered=tasks.filter(t=>{
    if(filters.status!=="Todos"&&t.status!==filters.status)return false;
    if(filters.priority!=="Todos"&&t.priority!==filters.priority)return false;
    if(filters.category!=="Todos"&&t.category!==filters.category)return false;
    if(filters.date&&t.dueDate!==filters.date)return false;
    const q=filters.search.toLowerCase();
    if(q&&!t.title.toLowerCase().includes(q)&&!(t.notes||"").toLowerCase().includes(q))return false;
    return true;
  });

  const fc=document.getElementById("filter-count");
  if(fc)fc.textContent=`${filtered.length} resultado${filtered.length!==1?"s":""}`;

  if(syncStatus==="loading"){container.innerHTML+=`<div class="loading-block"><div class="spin-icon">↻</div><div>Carregando…</div></div>`;return;}
  if(filtered.length===0){container.innerHTML+=`<div class="empty-block">Nenhuma tarefa encontrada${hasF?"<br><small>Tente ajustar os filtros</small>":""}</div>`;return;}

  STATUS_LABELS.forEach(sl=>{
    const group=filtered.filter(t=>t.status===sl);
    if(!group.length)return;
    const sc=STATUS_MAP[sl];
    const g=document.createElement("div");
    g.className="status-group";
    g.innerHTML=`<div class="status-group-header"><span class="status-group-dot" style="background:${sc.color}"></span><span class="status-group-label" style="color:${sc.color}">${sl}</span><span class="status-group-count">${group.length}</span></div>`;
    group.forEach(task=>g.appendChild(buildTaskRow(task)));
    container.appendChild(g);
  });
}

function buildTaskRow(task) {
  const sc=STATUS_MAP[task.status]||STATUSES[0];
  const over=isOverdue(task.dueDate,task.status),tod=isToday(task.dueDate),done=task.status==="Concluída";
  const pc=PRIORITY_COLORS[task.priority];
  const el=document.createElement("div");
  el.className="task-row";
  el.style.borderLeftColor=sc.color;
  if(done)el.style.opacity="0.68";
  el.onclick=()=>openModal(task);
  el.innerHTML=`
    <span class="task-status-pill" style="background:${sc.bg};color:${sc.color};border-color:${sc.border}">${task.status}</span>
    <div style="flex:1;min-width:0">
      <div class="task-title" style="color:${done?"#94a3b8":"#0f172a"};text-decoration:${done?"line-through":"none"}">${escHtml(task.title)}</div>
      ${task.notes?`<div class="task-notes">${escHtml(task.notes)}</div>`:""}
    </div>
    <div class="task-badges">
      ${task.etiqueta?`<span class="badge" style="background:${task.etiqueta==="MD"?"#eef2ff":"#e0f2fe"};color:${task.etiqueta==="MD"?"#4f46e5":"#0284c7"};font-weight:700">${task.etiqueta}</span>`:""}
      <span class="badge" style="background:#f1f5f9;color:#64748b">${task.category}</span>
      <span class="badge" style="background:${pc}18;color:${pc}">${task.priority}</span>
    </div>
    <div class="task-date" style="color:${over?"#dc2626":tod?"#ea580c":"#94a3b8"}">
      ${fmt(task.dueDate)}
      ${over?`<div class="task-date-sub" style="color:#dc2626">Atrasada</div>`:""}
      ${tod&&!over?`<div class="task-date-sub" style="color:#ea580c">Hoje</div>`:""}
    </div>`;
  return el;
}

function renderCalendar(container) {
  const days=calDaysArr(calYear,calMonth);
  const byDate={};
  tasks.forEach(t=>{if(t.dueDate){byDate[t.dueDate]=byDate[t.dueDate]||[];byDate[t.dueDate].push(t);}});
  const td=today(),isMob=window.innerWidth<768;
  const w=document.createElement("div");
  w.className="calendar-wrapper";
  w.innerHTML=`
    <div class="cal-header">
      <button class="cal-nav-btn" onclick="calPrev()">‹</button>
      <span class="cal-month-title">${MONTHS_PT[calMonth]} ${calYear}</span>
      <button class="cal-nav-btn" onclick="calNext()">›</button>
    </div>
    <div class="cal-weekdays">${(isMob?DAYS_SHORT:DAYS_PT).map(d=>`<div class="cal-weekday">${d}</div>`).join("")}</div>
    <div class="cal-grid" id="cal-grid"></div>`;
  container.appendChild(w);
  const grid=document.getElementById("cal-grid");
  days.forEach((day,i)=>{
    const cell=document.createElement("div");
    if(!day){cell.className="cal-cell empty";grid.appendChild(cell);return;}
    const ds=`${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
    const dt=byDate[ds]||[],isT=ds===td;
    cell.className=`cal-cell${isT?" today-cell":""}`;
    cell.onclick=()=>openModal({dueDate:ds});
    const dn=document.createElement("div");
    dn.className=isT?"cal-today-num":"cal-day-num";
    dn.textContent=day;
    cell.appendChild(dn);
    if(isMob){
      if(dt.length){const dots=document.createElement("div");dots.style.cssText="display:flex;gap:2px;flex-wrap:wrap;margin-top:2px";dt.slice(0,4).forEach(t=>{const sc=STATUS_MAP[t.status]||STATUSES[0];const d2=document.createElement("span");d2.style.cssText=`width:6px;height:6px;border-radius:50%;background:${sc.color};display:inline-block;cursor:pointer`;d2.onclick=e=>{e.stopPropagation();openModal(t);};dots.appendChild(d2);});cell.appendChild(dots);}
    } else {
      dt.slice(0,2).forEach(t=>{const sc=STATUS_MAP[t.status]||STATUSES[0];const chip=document.createElement("div");chip.className="cal-task-chip";chip.style.cssText=`background:${sc.bg};color:${sc.color};border-color:${sc.border}`;chip.textContent=t.title;chip.onclick=e=>{e.stopPropagation();openModal(t);};cell.appendChild(chip);});
      if(dt.length>2){const m=document.createElement("div");m.className="cal-more";m.textContent=`+${dt.length-2}`;cell.appendChild(m);}
    }
    grid.appendChild(cell);
  });
}

function calPrev(){if(calMonth===0){calMonth=11;calYear--;}else calMonth--;render();}
function calNext(){if(calMonth===11){calMonth=0;calYear++;}else calMonth++;render();}

// ═══════════════ MODAL ═══════════════
function setEtiqueta(val) {
  window._etiqueta = val;
  const colors = { MD:"#6366f1", MAD:"#0ea5e9" };
  ["MD","MAD",""].forEach(v => {
    const id = v ? `etq-${v.toLowerCase()}` : "etq-none";
    const btn = document.getElementById(id);
    if (!btn) return;
    const active = val === v;
    btn.style.borderColor  = active ? (colors[v]||"#e2e8f0") : "#e2e8f0";
    btn.style.background   = active ? (v==="MD"?"#eef2ff":v==="MAD"?"#e0f2fe":"#f1f5f9") : "#f8fafc";
    btn.style.color        = active ? (colors[v]||"#64748b") : "#94a3b8";
  });
}

function openModal(task) {
  const isExisting = task && task.id && !(!task.title && !task.status);
  editingId = isExisting ? task.id : null;
  const isNew = !editingId;
  document.getElementById("modal-title").textContent=isNew?"Nova tarefa":"Editar tarefa";
  document.querySelector(".btn-save").textContent=isNew?"Criar":"Salvar";
  document.getElementById("btn-delete").style.display=isNew?"none":"inline-block";
  document.getElementById("f-title").value=task?.title||"";
  document.getElementById("f-date").value=task?.dueDate||"";
  document.getElementById("f-notes").value=task?.notes||"";
  document.getElementById("f-status").value=task?.status||"Pendente";
  document.getElementById("f-priority").value=task?.priority||"Alta";
  document.getElementById("f-category").value=task?.category||"Jurídico";
  setEtiqueta(task?.etiqueta||"");
  updateModalStripe();
  document.getElementById("modal-overlay").classList.remove("hidden");
  setTimeout(()=>document.getElementById("f-title").focus(),100);
}

function updateModalStripe(){
  const s=STATUS_MAP[document.getElementById("f-status").value]||STATUSES[0];
  document.getElementById("modal-stripe").style.background=s.color;
  document.getElementById("f-status").style.color=s.color;
}
function closeModal(){document.getElementById("modal-overlay").classList.add("hidden");editingId=null;}
function closeModalOnBg(e){if(e.target===document.getElementById("modal-overlay"))closeModal();}

async function saveTask() {
  const title=document.getElementById("f-title").value.trim();
  if(!title){document.getElementById("f-title").focus();return;}
  const task={
    id:editingId||uid(),title,
    dueDate:document.getElementById("f-date").value,
    status:document.getElementById("f-status").value,
    priority:document.getElementById("f-priority").value,
    category:document.getElementById("f-category").value,
    notes:document.getElementById("f-notes").value.trim(),
    etiqueta:window._etiqueta||"",
  };
  closeModal();
  setSyncStatus("saving");
  try {
    if(editingId){await sbUpdate(task);tasks=tasks.map(t=>t.id===editingId?task:t);}
    else{await sbInsert(task);tasks=[...tasks,task];}
    setSyncStatus("saved");
  } catch{setSyncStatus("error");}
  render();
}

async function deleteTask() {
  if(!editingId)return;
  if(!confirm("Excluir esta tarefa?"))return;
  const id=editingId;
  closeModal();
  setSyncStatus("saving");
  try{await sbDelete(id);tasks=tasks.filter(t=>t.id!==id);setSyncStatus("saved");}
  catch{setSyncStatus("error");}
  render();
}

// ═══════════════ FILTERS ═══════════════
function clearFilters(){filters={status:"Todos",priority:"Todos",category:"Todos",date:"",search:""};render();}
function openFilterSheet(){
  document.getElementById("sheet-f-status").value=filters.status;
  document.getElementById("sheet-f-priority").value=filters.priority;
  document.getElementById("sheet-f-category").value=filters.category;
  document.getElementById("sheet-f-date").value=filters.date;
  const hasF=filters.status!=="Todos"||filters.priority!=="Todos"||filters.category!=="Todos"||filters.date;
  document.getElementById("sheet-clear-btn").style.display=hasF?"inline-block":"none";
  document.getElementById("filter-sheet-overlay").classList.remove("hidden");
}
function syncFiltersFromSheet(){
  filters.status=document.getElementById("sheet-f-status").value;
  filters.priority=document.getElementById("sheet-f-priority").value;
  filters.category=document.getElementById("sheet-f-category").value;
  filters.date=document.getElementById("sheet-f-date").value;
}
function closeFilterSheet(){syncFiltersFromSheet();document.getElementById("filter-sheet-overlay").classList.add("hidden");render();}

// ═══════════════ START ═══════════════
init();
</script>
